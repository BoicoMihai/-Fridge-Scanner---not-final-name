<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fridge Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/page.css">
</head>
<body>

<nav>
  <span class="nav-logo">Fridge Scanner</span>
  <div class="nav-links">
    <a href="#">Despre noi</a>
    <a href="#">Contact</a>
    <button class="btn-discover">Descoperă</button>
  </div>
</nav>

<div class="hero">
  <div class="search-card">
    <label>what's in your fridge?</label>
    <div class="input-row">
      <div class="input-wrapper">
        <input type="text" id="ghost" disabled>
        <input type="text" id="q" placeholder="scrie un ingredient..." onfocus="showHistory()" onblur="hideHistory()" oninput="ingredientSuggest()" onkeydown="handleKey(event)">
      </div>
      <button id="btn-search" onclick="search()">
         <img src="images/search.png" alt="search" width="18" height="18" id="search-icon">
       </button>
      <button class="btn-random" onclick="randomRecipe()">
        <img src="images/random.png" alt="random" id="random">
      </button>
    </div>
    <div id="dropdown"></div>
  </div>
</div>

<div class="results-section">
  <div id="loading" class="hidden">
    <div class="spinner"></div>
    <span>Se încarcă rețeta...</span>
  </div>
  <div id="recipe-card" class="hidden"></div>
</div>

<script src="src/main.js"></script>
</body>
</html>
